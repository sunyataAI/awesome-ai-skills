    summary_en: Eight official GSAP skills covering core animation, timelines, ScrollTrigger, plugins, React, Vue/Svelte, performance, and utility functions.
    why_it_matters_zh: 将 GSAP 的正确用法、框架生命周期清理、响应式动画和性能规则直接提供给编码 Agent，适合复杂网页动效开发。
    why_it_matters_en: It gives coding agents reliable GSAP patterns for framework lifecycle cleanup, responsive motion, scroll effects, and performance-sensitive animation.
