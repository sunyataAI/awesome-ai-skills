    summary_zh: 用自然语言创建、编辑和修复 Lottie JSON 动画，并要求在官方本地 Skia 播放器中预览和逐帧验证。
    summary_en: A skill for creating, editing, and fixing Lottie JSON animations with preview and frame-based verification in the official local Skia player.
    why_it_matters_zh: 不只生成 JSON，还规定了场景目录、可编辑属性、播放器和视觉验收流程，适合制作可交付的动态素材。
    why_it_matters_en: It goes beyond JSON generation by defining scene structure, editable controls, player setup, and visual QA for deliverable motion assets.
    status: active

