    languages:
      - Markdown
      - TypeScript
      - Vue
      - Python
    summary_zh: 基于 Vue、Three.js 和 GeoJSON 构建省级、中国、世界及多层级下钻 3D 地图，附带模板、主题工具、数据处理脚本和视觉回归检查。
    summary_en: A Vue, Three.js, and GeoJSON skill for province, China, world, and hierarchical drill-down 3D maps, with templates, theming tools, data scripts, and visual regression checks.
    why_it_matters_zh: 提供较完整的 3D 地图工程流程和可复用模板，适合数据大屏、区域可视化和地图范围迁移；复用时需遵守 GPL-3.0 和署名要求。
    why_it_matters_en: It provides a substantial reusable engineering workflow for dashboards and geographic visualization; derivatives must preserve its GPL-3.0 license and attribution requirements.
    status: active

  - name: Website to DESIGN.md
    repo: Paidax01/web-to-design-md
    url: https://github.com/Paidax01/web-to-design-md
    category: skills
    tags:
      - design-system
      - website-analysis
      - agent-browser
      - DESIGN.md
    languages:
      - Markdown
      - JavaScript
    summary_zh: 通过浏览器深入读取真实网站的 DOM、计算样式、CSS 变量和交互状态，整理成可复用的 DESIGN.md 与 HTML 视觉预览。
    summary_en: Inspects a live website's DOM, computed styles, CSS variables, and interaction states to produce a reusable DESIGN.md and companion HTML preview.
    why_it_matters_zh: 适合在重构、复刻或设计交接前沉淀网站视觉语言，比只看截图更能保留组件、响应式和交互规则。
    why_it_matters_en: Useful before redesigns, reimplementations, or handoffs because it captures component, responsive, and interaction rules beyond screenshots.
    status: active

