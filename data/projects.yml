    summary_zh: 面向角色分工和流程编排的 Agent 框架，强调 crew、role、task 等概念。
    summary_en: An agent framework centered on role-based collaboration and workflow orchestration using concepts such as crews, roles, and tasks.
    why_it_matters_zh: 便于观察面向业务流程的 Agent 抽象方式，也适合对比不同 Agent 框架的设计取舍。
