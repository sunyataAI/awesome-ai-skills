    summary_zh: shadcn/ui 官方 Agent skill，可读取项目配置，指导组件搜索、安装、组合、样式、表单、图标、Registry 和 preset 工作流。
    summary_en: The official shadcn/ui agent skill for project-aware component discovery, installation, composition, styling, forms, icons, registries, and presets.
    why_it_matters_zh: 能减少 Agent 手写重复组件或误用 API 的情况，并通过官方 CLI、项目上下文和规则文件提高 shadcn 项目的实现一致性。
    why_it_matters_en: It reduces unnecessary custom components and API mistakes by grounding agents in the official CLI, project context, and current composition rules.
