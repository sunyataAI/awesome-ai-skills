projects:
  - name: Model Context Protocol Servers
    repo: modelcontextprotocol/servers
    url: https://github.com/modelcontextprotocol/servers
    category: mcp
    tags:
      - MCP
      - integrations
      - tools
    languages:
      - TypeScript
      - Python
    summary_zh: MCP 官方服务器集合，覆盖文件系统、Git、数据库、浏览器自动化等常见工具接入场景。
    summary_en: A collection of official MCP server implementations covering common integrations such as filesystems, Git, databases, and browser automation.
    why_it_matters_zh: 适合作为理解 MCP 工具边界、server 结构和接入方式的基础参考。
    why_it_matters_en: Useful as a reference for understanding MCP server boundaries, implementation structure, and integration patterns.
    status: active

  - name: OpenAI Cookbook
    repo: openai/openai-cookbook
    url: https://github.com/openai/openai-cookbook
    category: developer-tools
    tags:
      - examples
      - recipes
      - SDK
    languages:
      - Python
      - Jupyter Notebook
    summary_zh: OpenAI API 示例和实践配方集合，覆盖模型调用、检索、工具调用、评估等常见开发主题。
    summary_en: Practical examples and recipes for using OpenAI APIs across model calls, retrieval, tool use, evaluation, and common application patterns.
    why_it_matters_zh: 适合作为 AI 应用开发的入门和参考资料，很多模式可迁移到实际产品。
    why_it_matters_en: A practical reference for AI application development, with many reusable patterns for production systems.
    status: active

  - name: AutoGen
    repo: microsoft/autogen
    url: https://github.com/microsoft/autogen
    category: agents
    tags:
      - multi-agent
      - orchestration
      - framework
    languages:
      - Python
    summary_zh: 微软开源的 Agent 应用框架，重点支持多 Agent 协作、对话编排和自动化任务执行。
    summary_en: An open source framework from Microsoft for building agentic applications, with emphasis on multi-agent collaboration, conversation orchestration, and automated task execution.
    why_it_matters_zh: 多 Agent 方向的代表性项目之一，适合研究 Agent 协作模式和工程化接口设计。
    why_it_matters_en: A representative multi-agent project for studying collaboration patterns and engineering interfaces for agent systems.
    status: active

  - name: CrewAI
    repo: crewAIInc/crewAI
    url: https://github.com/crewAIInc/crewAI
    category: agents
    tags:
      - agents
      - workflow
      - orchestration
    languages:
      - Python
    summary_zh: 面向角色分工和流程编排的 Agent 框架，强调 crew、role、task 等概念。
    summary_en: An agent framework centered on role-based collaboration and workflow orchestration using concepts such as crews, roles, and tasks.
    why_it_matters_zh: 便于观察面向业务流程的 Agent 抽象方式，也适合对比不同 Agent 框架的设计取舍。
    why_it_matters_en: Useful for studying business-workflow-oriented agent abstractions and comparing design tradeoffs across agent frameworks.
    status: active

  - name: LangChain
    repo: langchain-ai/langchain
    url: https://github.com/langchain-ai/langchain
    category: developer-tools
    tags:
      - framework
      - integrations
      - LLM apps
    languages:
      - Python
      - TypeScript
    summary_zh: LLM 应用开发框架和生态，覆盖模型、工具、检索、Agent、工作流等大量集成。
    summary_en: A broad framework and ecosystem for LLM application development, covering models, tools, retrieval, agents, workflows, and integrations.
    why_it_matters_zh: 生态广、案例多，适合作为观察 AI 应用工程化模式和集成复杂度的参考。
    why_it_matters_en: Its broad ecosystem and many examples make it useful for studying engineering patterns and integration complexity in LLM applications.
    status: active

  - name: Diffusion Studio Lottie Skill
    repo: diffusionstudio/lottie
    url: https://github.com/diffusionstudio/lottie
    category: skills
    tags:
      - Lottie
      - motion-design
      - Skia
      - animation
    languages:
      - Markdown
      - TypeScript
    summary_zh: 用自然语言创建、编辑和修复 Lottie JSON 动画，并要求在官方本地 Skia 播放器中预览和逐帧验证。
    summary_en: A skill for creating, editing, and fixing Lottie JSON animations with preview and frame-based verification in the official local Skia player.
    why_it_matters_zh: 不只生成 JSON，还规定了场景目录、可编辑属性、播放器和视觉验收流程，适合制作可交付的动态素材。
    why_it_matters_en: It goes beyond JSON generation by defining scene structure, editable controls, player setup, and visual QA for deliverable motion assets.
    status: active

  - name: Official GSAP Skills
    repo: greensock/gsap-skills
    url: https://github.com/greensock/gsap-skills
    category: skills
    tags:
      - GSAP
      - ScrollTrigger
      - animation
      - React
      - Vue
    languages:
      - Markdown
      - JavaScript
    summary_zh: GSAP 官方维护的 8 个技能包，覆盖核心动画、时间线、ScrollTrigger、插件、React、Vue/Svelte、性能和工具函数。
    summary_en: Eight official GSAP skills covering core animation, timelines, ScrollTrigger, plugins, React, Vue/Svelte, performance, and utility functions.
    why_it_matters_zh: 将 GSAP 的正确用法、框架生命周期清理、响应式动画和性能规则直接提供给编码 Agent，适合复杂网页动效开发。
    why_it_matters_en: It gives coding agents reliable GSAP patterns for framework lifecycle cleanup, responsive motion, scroll effects, and performance-sensitive animation.
    status: active

  - name: Three Scope Map Skill
    repo: songsummer920-dazzle/three-scope-map-skill
    url: https://github.com/songsummer920-dazzle/three-scope-map-skill
    category: skills
    tags:
      - Three.js
      - Vue
      - 3D-map
      - GeoJSON
      - drilldown
    languages:
      - Markdown
      - TypeScript
      - Vue
      - Python
    summary_zh: 基于 Vue、Three.js 和 GeoJSON 构建省级、中国、世界及多层级下钻 3D 地图，附带模板、主题工具、数据处理脚本和视觉回归检查。
    summary_en: A Vue, Three.js, and GeoJSON skill for province, China, world, and hierarchical drill-down 3D maps, with templates, theming tools, data scripts, and visual regression checks.
    why_it_matters_zh: 提供较完整的 3D 地图工程流程和可复用模板，适合数据大屏、区域可视化和地图范围迁移；复用时需遵守 GPL-3.0 和署名要求。
    why_it_matters_en: It provides a substantial reusable engineering workflow for dashboards and geographic visualization; derivatives must preserve its GPL-3.0 license and attribution requirements.
    status: active

  - name: Website to DESIGN.md
    repo: Paidax01/web-to-design-md
    url: https://github.com/Paidax01/web-to-design-md
    category: skills
    tags:
      - design-system
      - website-analysis
      - agent-browser
      - DESIGN.md
    languages:
      - Markdown
      - JavaScript
    summary_zh: 通过浏览器深入读取真实网站的 DOM、计算样式、CSS 变量和交互状态，整理成可复用的 DESIGN.md 与 HTML 视觉预览。
    summary_en: Inspects a live website's DOM, computed styles, CSS variables, and interaction states to produce a reusable DESIGN.md and companion HTML preview.
    why_it_matters_zh: 适合在重构、复刻或设计交接前沉淀网站视觉语言，比只看截图更能保留组件、响应式和交互规则。
    why_it_matters_en: Useful before redesigns, reimplementations, or handoffs because it captures component, responsive, and interaction rules beyond screenshots.
    status: active

  - name: shadcn Skill
    repo: shadcn-ui/ui
    url: https://ui.shadcn.com/docs/skills
    category: skills
    tags:
      - shadcn-ui
      - React
      - components
      - design-system
      - CLI
    languages:
      - Markdown
      - TypeScript
    summary_zh: shadcn/ui 官方 Agent skill，可读取项目配置，指导组件搜索、安装、组合、样式、表单、图标、Registry 和 preset 工作流。
    summary_en: The official shadcn/ui agent skill for project-aware component discovery, installation, composition, styling, forms, icons, registries, and presets.
    why_it_matters_zh: 能减少 Agent 手写重复组件或误用 API 的情况，并通过官方 CLI、项目上下文和规则文件提高 shadcn 项目的实现一致性。
    why_it_matters_en: It reduces unnecessary custom components and API mistakes by grounding agents in the official CLI, project context, and current composition rules.
    status: active
