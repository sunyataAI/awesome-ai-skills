    category: agents
    tags:
      - multi-agent
      - orchestration
      - framework
    languages:
      - Python
    summary_zh: 微软开源的 Agent 应用框架，重点支持多 Agent 协作、对话编排和自动化任务执行。
    summary_en: An open source framework from Microsoft for building agentic applications, with emphasis on multi-agent collaboration, conversation orchestration, and automated task execution.
    why_it_matters_zh: 多 Agent 方向的代表性项目之一，适合研究 Agent 协作模式和工程化接口设计。
    why_it_matters_en: A representative multi-agent project for studying collaboration patterns and engineering interfaces for agent systems.
    status: active

